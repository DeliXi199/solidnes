project: solidnes
experiment_name: diamond_c_psiformer_pbc_gamma_deepqmc_attention_fused_qkv_spin_beta10_merge_none_batch4096_iter10000
stage: psiformer
phase: attention_qkv_spin0_4gpu_10000

backend:
  name: ferminet
  repository: https://github.com/google-deepmind/ferminet
  inspected_commit: c4312c315dda1c5728994ba89629744f71c6eb66
  mode: native_ferminet_psiformer_training

system_config: ../system/diamond_c_primitive_gamma.yaml
model_config: ../model/psiformer_pbc_paper_attention_fused_qkv_x64_jaxattn.yaml
sampler_config: ../sampler/metropolis_ferminet_pbc_short.yaml
train_config: ../train/excited_state_psiformer_pbc_native_kfac_deepqmc_spin_beta10_merge_none_batch4096_iter10000.yaml

ferminet_config_template:
  module: solidnes/backends/ferminet_configs/diamond_pbc_gamma.py

runtime:
  target_jax_version: 0.10.1
  cuda_extra: cuda12
  precision_profile: fp64
  x64_enabled: true
  require_gpu: true
  xla_python_client_preallocate: true
  xla_python_client_mem_fraction: 0.90

output:
  log_dir: tasks/psiformer/0106_attention_qkv_spin0_4gpu_10000/runs/fused_qkv_merge_none/logs/backend
  checkpoint_dir: tasks/psiformer/0106_attention_qkv_spin0_4gpu_10000/runs/fused_qkv_merge_none/results/checkpoints
  validation_dir: tasks/psiformer/0106_attention_qkv_spin0_4gpu_10000/runs/fused_qkv_merge_none/results/validation

diagnostics:
  native_ferminet_excited_state: true
  expected_states: 2
  independent_state_params: true
  independent_state_merge_keys: []
  diagonal_paths: {mcmc_trace: true, local_energy: true, overlap_jvp: true}
  profile_step_times: true
  objective: vmc_overlap
  method_profile: szabo_noe_2024_penalty
  optimizer: kfac
  batch_size: 4096
  iterations: 10000
  model: psiformer
  attention_implementation: fused_qkv
  attention_kernel_gpu: jax
  spin_penalty: 10.0
  spin_target_s2: 0.0
  spin_estimator: deepqmc_state_specific
  log_spin_by_state: true
  observables_s2: false
  scheduler_partitions: [amdgpu40g, amdgpu80g, h200]
  scheduler_gpus: 4
  scheduler_cpus: 64
  expected_outputs:
    - train_stats.csv
    - energy_matrix.npy
    - bare_energy_matrix.npy
    - overlap_matrix.npy
    - overlap_symmetric_matrix.npy
    - overlap_penalty_matrix.npy
    - overlap_gradient_scale.npy
    - overlap_state_ordering.npy

notes:
  status: ready_for_attention_qkv_spin0_4gpu_10000
  purpose: >-
    Fused-QKV no-merge two-state PsiFormer run with DeepQMC-style
    beta * <S^2> spin penalty targeting total spin S=0 for both states and
    per-step per-state spin columns in train_stats.csv without full S2 matrix
    observables.
