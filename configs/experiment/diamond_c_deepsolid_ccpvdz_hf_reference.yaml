project: solidnes
experiment_name: diamond_c_deepsolid_ccpvdz_hf_reference
stage: phase1_validation
phase: carbon_diamond_hf_reference_basis_alignment

backend:
  name: deepsolid
  repository: https://github.com/bytedance/DeepSolid
  inspected_commit: 812a2b8
  mode: external_backend

system_config: ../system/diamond_c_primitive_gamma.yaml
model_config: ../model/deepsolid_detnet_small.yaml
sampler_config: ../sampler/metropolis_deepsolid_smoke.yaml
train_config: ../train/ground_state_deepsolid_smoke.yaml

deepsolid_config_template:
  module: DeepSolid/config/diamond.py
  input_string: C,C,3.57,1,ccpvdz

output:
  log_dir: tasks/phase1_diamond_c/ccpvdz/references/0018_deepsolid_ccpvdz_hf_reference/logs/backend
  checkpoint_dir: tasks/phase1_diamond_c/ccpvdz/references/0018_deepsolid_ccpvdz_hf_reference/results/checkpoints
  validation_dir: tasks/phase1_diamond_c/ccpvdz/references/0018_deepsolid_ccpvdz_hf_reference/results/validation

diagnostics:
  import_deepsolid: true
  build_pyscf_cell: true
  electron_count: true
  hf_reference: true

notes:
  status: hf_reference_ready
  purpose: validate the C diamond cc-pVDZ same-cell HF baseline before scaling VMC parameters
  target_reference_hartree: -74.9784
  physics_caveat: 1x1x1 primitive cell at gamma with a=3.57 Angstrom; compare only to matching-cell runs
