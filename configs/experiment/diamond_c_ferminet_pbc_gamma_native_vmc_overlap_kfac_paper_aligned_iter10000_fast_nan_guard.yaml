project: solidnes
experiment_name: diamond_c_ferminet_pbc_gamma_native_vmc_overlap_kfac_paper_aligned_iter10000_fast_nan_guard
stage: excited_state_nesvmc
phase: ferminet_native_vmc_overlap_kfac_paper_aligned_iter10000_fast_nan_guard

backend:
  name: ferminet
  repository: https://github.com/google-deepmind/ferminet
  inspected_commit: c4312c315dda1c5728994ba89629744f71c6eb66
  mode: native_ferminet_excited_state

system_config: ../system/diamond_c_primitive_gamma.yaml
model_config: ../model/ferminet_pbc_small.yaml
sampler_config: ../sampler/metropolis_ferminet_pbc_short.yaml
train_config: ../train/excited_state_ferminet_pbc_native_kfac_paper_aligned_iter10000_fast_nan_guard.yaml

ferminet_config_template:
  module: solidnes/backends/ferminet_configs/diamond_pbc_gamma.py

runtime:
  target_jax_version: 0.10.1
  cuda_extra: cuda12
  precision_profile: speed
  x64_enabled: false
  require_gpu: true
  xla_python_client_preallocate: true
  xla_python_client_mem_fraction: 0.90

output:
  log_dir: tasks/excited_state_nesvmc/0093_ferminet_native_vmc_overlap_kfac_paper_aligned_iter10000_fast_nan_guard/logs/backend
  checkpoint_dir: tasks/excited_state_nesvmc/0093_ferminet_native_vmc_overlap_kfac_paper_aligned_iter10000_fast_nan_guard/results/checkpoints
  validation_dir: tasks/excited_state_nesvmc/0093_ferminet_native_vmc_overlap_kfac_paper_aligned_iter10000_fast_nan_guard/results/validation

diagnostics:
  import_ferminet: true
  build_pbc_config: true
  native_ferminet_excited_state: true
  expected_states: 2
  objective: vmc_overlap
  method_profile: szabo_noe_2024_penalty
  optimizer: kfac
  batch_size: 4096
  iterations: 10000
  spin_penalty: 0.0
  observables_s2: false
  check_nan: false
  reset_if_nan: false
  overlap_penalty: 4.0
  overlap_scale_by: max_gap_std
  overlap_clip_width: 10.0
  overlap_sort_states_by: energy
  clip_median: true
  expected_outputs:
    - train_stats.csv
    - energy_matrix.npy
    - overlap_matrix.npy
    - overlap_symmetric_matrix.npy
    - overlap_penalty_matrix.npy
    - overlap_gradient_scale.npy
    - overlap_state_ordering.npy
    - overlap_scale_energy_ewm.npy
    - overlap_scale_std_ewm.npy

notes:
  status: ready_for_submission
  purpose: >-
    Replace task 0092's heavyweight per-step NaN debug run with the original
    production-speed route and monitor NaNs outside the training step.
