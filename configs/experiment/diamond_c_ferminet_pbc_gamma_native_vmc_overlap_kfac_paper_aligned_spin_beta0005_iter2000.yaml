project: solidnes
experiment_name: diamond_c_ferminet_pbc_gamma_native_vmc_overlap_kfac_paper_aligned_spin_beta0005_iter2000
stage: excited_state_nesvmc
phase: ferminet_native_vmc_overlap_kfac_paper_aligned_spin_beta0005_iter2000

backend:
  name: ferminet
  repository: https://github.com/google-deepmind/ferminet
  inspected_commit: c4312c315dda1c5728994ba89629744f71c6eb66
  mode: native_ferminet_excited_state

system_config: ../system/diamond_c_primitive_gamma.yaml
model_config: ../model/ferminet_pbc_small.yaml
sampler_config: ../sampler/metropolis_ferminet_pbc_short.yaml
train_config: ../train/excited_state_ferminet_pbc_native_kfac_paper_aligned_spin_beta0005_iter2000.yaml

ferminet_config_template:
  module: solidnes/backends/ferminet_configs/diamond_pbc_gamma.py

runtime:
  target_jax_version: 0.10.1
  cuda_extra: cuda12
  precision_profile: speed
  x64_enabled: false
  require_gpu: true
  xla_python_client_preallocate: true
  xla_python_client_mem_fraction: 0.90

output:
  log_dir: tasks/excited_state_nesvmc/0086_ferminet_native_vmc_overlap_kfac_paper_aligned_spin_beta_sweep_iter2000/runs/beta0005/logs/backend
  checkpoint_dir: tasks/excited_state_nesvmc/0086_ferminet_native_vmc_overlap_kfac_paper_aligned_spin_beta_sweep_iter2000/runs/beta0005/results/checkpoints
  validation_dir: tasks/excited_state_nesvmc/0086_ferminet_native_vmc_overlap_kfac_paper_aligned_spin_beta_sweep_iter2000/runs/beta0005/results/validation

diagnostics:
  import_ferminet: true
  build_pbc_config: true
  native_ferminet_excited_state: true
  expected_states: 2
  objective: vmc_overlap
  method_profile: szabo_noe_2024_penalty
  optimizer: kfac
  batch_size: 4096
  iterations: 2000
  overlap_penalty: 4.0
  overlap_scale_by: max_gap_std
  overlap_clip_width: 10.0
  overlap_sort_states_by: energy
  spin_penalty: 0.005
  observables_s2: true
  clip_median: true
  expected_outputs:
    - train_stats.csv
    - energy_matrix.npy
    - bare_energy_matrix.npy
    - overlap_matrix.npy
    - overlap_symmetric_matrix.npy
    - overlap_penalty_matrix.npy
    - overlap_gradient_scale.npy
    - overlap_state_ordering.npy
    - overlap_scale_energy_ewm.npy
    - overlap_scale_std_ewm.npy
    - s2_matrix.npy

notes:
  status: ready_for_gpu_beta_sweep
  purpose: >-
    2000-step spin-penalty beta sweep point for the paper-aligned native
    FermiNet PBC excited-state path.
