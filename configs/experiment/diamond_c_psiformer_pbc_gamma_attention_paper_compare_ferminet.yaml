project: solidnes
experiment_name: diamond_c_psiformer_pbc_gamma_attention_paper_compare_ferminet
stage: psiformer
phase: psiformer_attention_full_stack

backend:
  name: ferminet
  repository: https://github.com/google-deepmind/ferminet
  inspected_commit: c4312c315dda1c5728994ba89629744f71c6eb66
  mode: native_ferminet_psiformer_training

system_config: ../system/diamond_c_primitive_gamma.yaml
model_config: ../model/psiformer_pbc_paper_attention_ferminet.yaml
sampler_config: ../sampler/metropolis_ferminet_pbc_short.yaml
train_config: ../train/excited_state_psiformer_pbc_native_kfac_attention_paper_benchmark_batch512_iter5.yaml

ferminet_config_template:
  module: solidnes/backends/ferminet_configs/diamond_pbc_gamma.py

runtime:
  target_jax_version: 0.10.1
  cuda_extra: cuda12
  precision_profile: speed
  x64_enabled: false
  require_gpu: true
  xla_python_client_preallocate: true
  xla_python_client_mem_fraction: 0.90

output:
  log_dir: tasks/psiformer/0096_psiformer_attention_full_stack/runs/ferminet_b512/logs/backend
  checkpoint_dir: tasks/psiformer/0096_psiformer_attention_full_stack/runs/ferminet_b512/results/checkpoints
  validation_dir: tasks/psiformer/0096_psiformer_attention_full_stack/runs/ferminet_b512/results/validation

diagnostics:
  import_ferminet: true
  build_pbc_config: true
  native_ferminet_excited_state: true
  expected_states: 2
  objective: vmc_overlap
  method_profile: szabo_noe_2024_penalty
  optimizer: kfac
  batch_size: 512
  iterations: 5
  model: psiformer
  model_size: paper
  attention_implementation: ferminet
  expected_outputs:
    - train_stats.csv
    - runtime metadata with resolved ferminet attention

notes:
  status: ready_for_control_training
  purpose: upstream-attention control for paper-scale no-pretrain PsiFormer.
