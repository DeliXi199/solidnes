project: solidnes
experiment_name: diamond_c_psiformer_pbc_gamma_attention_paper_test_jaxattn_x64_smoke
stage: psiformer
phase: psiformer_attention_full_stack

backend:
  name: ferminet
  repository: https://github.com/google-deepmind/ferminet
  inspected_commit: c4312c315dda1c5728994ba89629744f71c6eb66
  mode: native_ferminet_psiformer_training

system_config: ../system/diamond_c_primitive_gamma.yaml
model_config: ../model/psiformer_pbc_paper_attention_fused_qkv_x64_jaxattn.yaml
sampler_config: ../sampler/metropolis_ferminet_pbc_short.yaml
train_config: ../train/excited_state_psiformer_pbc_native_kfac_attention_paper_smoke_batch512_iter2_levmap64.yaml

ferminet_config_template:
  module: solidnes/backends/ferminet_configs/diamond_pbc_gamma.py

runtime:
  target_jax_version: 0.10.1
  cuda_extra: cuda12
  precision_profile: fp64
  x64_enabled: true
  require_gpu: true
  xla_python_client_preallocate: true
  xla_python_client_mem_fraction: 0.90

output:
  log_dir: tasks/psiformer/0096_psiformer_attention_full_stack/runs/test_jaxattn_x64_smoke/logs/backend
  checkpoint_dir: tasks/psiformer/0096_psiformer_attention_full_stack/runs/test_jaxattn_x64_smoke/results/checkpoints
  validation_dir: tasks/psiformer/0096_psiformer_attention_full_stack/runs/test_jaxattn_x64_smoke/results/validation

diagnostics:
  import_ferminet: true
  build_pbc_config: true
  native_ferminet_excited_state: true
  expected_states: 2
  objective: vmc_overlap
  method_profile: szabo_noe_2024_penalty
  optimizer: kfac
  batch_size: 512
  iterations: 2
  max_vmap_batch_size: 0
  max_local_energy_vmap_batch_size: 64
  spin_penalty: 0.0
  observables_s2: false
  model: psiformer
  model_size: paper
  attention_implementation: fused_qkv
  attention_kernel_gpu: jax
  precision_profile: fp64
  x64_enabled: true
  psiformer_tf32: false
  scheduler_partitions: [test]
  scheduler_gpus: 2
  scheduler_cpus: 64
  expected_outputs:
    - train_stats.csv
    - runtime metadata with resolved fused_qkv attention

notes:
  status: ready_test_partition_x64_jax_attention_smoke
  purpose: >-
    Quick test-partition flow check for the pure-JAX attention kernel before
    the full 4-GPU/64-CPU compile probe leaves the production GPU queue.
