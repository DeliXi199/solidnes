project: solidnes
experiment_name: diamond_c_ferminet_pbc_gamma_kfac_folx_batch4096_x64_burnin1000_iter20000_pbc_hf_pretrain_paper_pilot
stage: phase1_backend
phase: ferminet_pbc_ground_state_paper_reproduction_pbc_hf_pretrain_pilot

backend:
  name: ferminet
  repository: https://github.com/google-deepmind/ferminet
  inspected_commit: c4312c315dda1c5728994ba89629744f71c6eb66
  mode: external_backend_with_local_patch

system_config: ../system/diamond_c_primitive_gamma_paper.yaml
model_config: ../model/ferminet_pbc_paper.yaml
sampler_config: ../sampler/metropolis_ferminet_pbc_mcmc20_burnin1000.yaml
train_config: ../train/ground_state_ferminet_pbc_kfac_folx_batch4096_iter20000_pbc_hf_pretrain.yaml

ferminet_config_template:
  module: solidnes/backends/ferminet_configs/diamond_pbc_gamma_paper.py

runtime:
  target_jax_version: 0.10.1
  cuda_extra: cuda12
  precision_profile: fp64
  x64_enabled: true
  require_gpu: true
  xla_python_client_preallocate: true
  xla_python_client_mem_fraction: 0.90

output:
  log_dir: tasks/ferminet_pretraining/0045_ferminet_kfac_folx_batch4096_x64_burnin1000_iter20000_pbc_hf_pretrain_paper_pilot/logs/backend
  checkpoint_dir: tasks/ferminet_pretraining/0045_ferminet_kfac_folx_batch4096_x64_burnin1000_iter20000_pbc_hf_pretrain_paper_pilot/results/checkpoints
  validation_dir: tasks/ferminet_pretraining/0045_ferminet_kfac_folx_batch4096_x64_burnin1000_iter20000_pbc_hf_pretrain_paper_pilot/results/validation

diagnostics:
  import_ferminet: true
  build_pbc_config: true
  pbc_hf_pretrain: true
  train_stats: true
  compare_to_deepsolid_supplementary_diamond: true

notes:
  status: ready_to_submit
  purpose: paper-geometry x64 pilot with true PySCF PBC-HF orbital pretraining before VMC optimization
  paper_reference:
    energy_hartree: -75.4009
    hf_hartree: -74.9784
    cell: 1x1x1 Gamma
    electrons: 12
  pretraining:
    method: pbc_hf
    basis: ccpvdz
    iterations: 1000
    sampling: neural_network_walkers
    caveat: PySCF PBC orbital evaluation runs on host each pretraining iteration
  local_patch:
    files:
      - external/ferminet/ferminet/base_config.py
      - external/ferminet/ferminet/pretrain.py
      - external/ferminet/ferminet/train.py
    change: add PBC-HF orbital pretraining path for FermiNet PBC configs
