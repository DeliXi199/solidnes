project: solidnes
experiment_name: diamond_c_psiformer_pbc_gamma_native_training_smoke_auto
stage: psiformer
phase: psiformer_native_training_smoke

backend:
  name: ferminet
  repository: https://github.com/google-deepmind/ferminet
  inspected_commit: c4312c315dda1c5728994ba89629744f71c6eb66
  mode: native_ferminet_psiformer_training

system_config: ../system/diamond_c_primitive_gamma.yaml
model_config: ../model/psiformer_pbc_small.yaml
sampler_config: ../sampler/metropolis_ferminet_pbc_short.yaml
train_config: ../train/excited_state_psiformer_pbc_native_kfac_training_smoke_batch256_iter2.yaml

ferminet_config_template:
  module: solidnes/backends/ferminet_configs/diamond_pbc_gamma.py

runtime:
  target_jax_version: 0.10.1
  cuda_extra: cuda12
  precision_profile: speed
  x64_enabled: false
  require_gpu: true
  xla_python_client_preallocate: true
  xla_python_client_mem_fraction: 0.90

output:
  log_dir: tasks/psiformer/0095_psiformer_native_training_smoke/runs/auto_smoke/logs/backend
  checkpoint_dir: tasks/psiformer/0095_psiformer_native_training_smoke/runs/auto_smoke/results/checkpoints
  validation_dir: tasks/psiformer/0095_psiformer_native_training_smoke/runs/auto_smoke/results/validation

diagnostics:
  import_ferminet: true
  build_pbc_config: true
  native_ferminet_excited_state: true
  expected_states: 2
  objective: vmc_overlap
  method_profile: szabo_noe_2024_penalty
  optimizer: kfac
  batch_size: 256
  iterations: 2
  model: psiformer
  attention_implementation: auto
  expected_outputs:
    - train_stats.csv
    - energy_matrix.npy
    - overlap diagnostics
    - runtime metadata with resolved fused_qkv attention on GPU

notes:
  status: ready_for_gpu_smoke
  purpose: >-
    First scheduled native FermiNet training smoke for the SolidNES PsiFormer
    self-attention path.
