project: solidnes
experiment_name: diamond_c_ferminet_pbc_gamma_real_local_energy_smoke
stage: excited_state_nesvmc
phase: ferminet_pbc_real_local_energy_smoke

backend:
  name: ferminet
  repository: https://github.com/google-deepmind/ferminet
  inspected_commit: c4312c315dda1c5728994ba89629744f71c6eb66
  mode: external_backend_with_local_patch

system_config: ../system/diamond_c_primitive_gamma.yaml
model_config: ../model/ferminet_pbc_small.yaml
sampler_config: ../sampler/metropolis_ferminet_pbc_short.yaml
train_config: ../train/ground_state_ferminet_pbc_adam_short100.yaml

ferminet_config_template:
  module: solidnes/backends/ferminet_configs/diamond_pbc_gamma.py

runtime:
  target_jax_version: 0.10.1
  cuda_extra: cuda12
  precision_profile: speed
  x64_enabled: false
  require_gpu: true
  xla_python_client_preallocate: true
  xla_python_client_mem_fraction: 0.90

output:
  log_dir: tasks/excited_state_nesvmc/0063_ferminet_pbc_real_local_energy_smoke/logs/backend
  checkpoint_dir: >-
    tasks/excited_state_nesvmc/0063_ferminet_pbc_real_local_energy_smoke/results/checkpoints
  validation_dir: >-
    tasks/excited_state_nesvmc/0063_ferminet_pbc_real_local_energy_smoke/results/validation

diagnostics:
  import_ferminet: true
  build_pbc_config: true
  real_pbc_local_energy_smoke: true
  expected_external_states: 2
  walkers_per_state: 1
  expected_output:
    - finite local-energy matrix with shape [2, 1]
    - finite state energies with shape [2]
    - finite 2x2 overlap matrix
    - finite scalar penalty objective

notes:
  status: ready_for_scheduled_smoke
  purpose: first scheduled two-state FermiNet PBC real local-energy/Laplacian smoke
  local_patch:
    file: external/ferminet/ferminet/networks.py
    change: construct_symmetric_features uses broadcast_to instead of tile for spin-channel means
