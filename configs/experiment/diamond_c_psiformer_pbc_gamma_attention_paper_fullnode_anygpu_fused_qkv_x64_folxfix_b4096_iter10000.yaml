project: solidnes
experiment_name: diamond_c_psiformer_pbc_gamma_attention_paper_fullnode_anygpu_fused_qkv_x64_folxfix_b4096_iter10000
stage: psiformer
phase: psiformer_attention_full_stack

backend:
  name: ferminet
  repository: https://github.com/google-deepmind/ferminet
  inspected_commit: c4312c315dda1c5728994ba89629744f71c6eb66
  mode: native_ferminet_psiformer_training

system_config: ../system/diamond_c_primitive_gamma.yaml
model_config: ../model/psiformer_pbc_paper_attention_fused_qkv_x64.yaml
sampler_config: ../sampler/metropolis_ferminet_pbc_short.yaml
train_config: ../train/excited_state_psiformer_pbc_native_kfac_attention_paper_benchmark_batch4096_iter10000.yaml

ferminet_config_template:
  module: solidnes/backends/ferminet_configs/diamond_pbc_gamma.py

runtime:
  target_jax_version: 0.10.1
  cuda_extra: cuda12
  precision_profile: fp64
  x64_enabled: true
  require_gpu: true
  xla_python_client_preallocate: true
  xla_python_client_mem_fraction: 0.90

output:
  log_dir: tasks/psiformer/0096_psiformer_attention_full_stack/runs/fullnode_anygpu_fused_qkv_x64_folxfix_b4096_i10000/logs/backend
  checkpoint_dir: tasks/psiformer/0096_psiformer_attention_full_stack/runs/fullnode_anygpu_fused_qkv_x64_folxfix_b4096_i10000/results/checkpoints
  validation_dir: tasks/psiformer/0096_psiformer_attention_full_stack/runs/fullnode_anygpu_fused_qkv_x64_folxfix_b4096_i10000/results/validation

diagnostics:
  import_ferminet: true
  build_pbc_config: true
  native_ferminet_excited_state: true
  expected_states: 2
  objective: vmc_overlap
  method_profile: szabo_noe_2024_penalty
  optimizer: kfac
  batch_size: 4096
  iterations: 10000
  overlap_penalty: 4.0
  overlap_scale_by: max_gap_std
  overlap_clip_width: 10.0
  overlap_sort_states_by: energy
  spin_penalty: 0.0
  observables_s2: false
  model: psiformer
  model_size: paper
  attention_implementation: fused_qkv
  precision_profile: fp64
  x64_enabled: true
  psiformer_tf32: false
  folx_spin_concat_fix: true
  scheduler_partitions: [amdgpu40g, amdgpu80g]
  scheduler_gpus: 4
  scheduler_cpus: 64
  expected_outputs:
    - train_stats.csv
    - energy_matrix.npy
    - overlap_matrix.npy
    - overlap_symmetric_matrix.npy
    - overlap_penalty_matrix.npy
    - overlap_gradient_scale.npy
    - overlap_state_ordering.npy
    - overlap_scale_energy_ewm.npy
    - overlap_scale_std_ewm.npy
    - runtime metadata with resolved fused_qkv attention

notes:
  status: ready_fullnode_attention_x64_folxfix_gap
  purpose: >-
    Fused-QKV 4-GPU 10000-step x64 gap candidate after the SolidNES
    PsiFormer/FOLX spin-feature concatenate fix; Slurm may run it on either
    amdgpu40g or amdgpu80g.
