project: solidnes
experiment_name: diamond_c_ferminet_pbc_gamma_paper_tangent_training_smoke_fix
stage: excited_state_nesvmc
phase: ferminet_pbc_paper_tangent_training_smoke_fix

backend:
  name: ferminet
  repository: https://github.com/google-deepmind/ferminet
  inspected_commit: c4312c315dda1c5728994ba89629744f71c6eb66
  mode: external_backend_with_local_patch

system_config: ../system/diamond_c_primitive_gamma.yaml
model_config: ../model/ferminet_pbc_small.yaml
sampler_config: ../sampler/metropolis_ferminet_pbc_short.yaml
train_config: ../train/ground_state_ferminet_pbc_adam_short100.yaml

ferminet_config_template:
  module: solidnes/backends/ferminet_configs/diamond_pbc_gamma.py

runtime:
  target_jax_version: 0.10.1
  cuda_extra: cuda12
  precision_profile: speed
  x64_enabled: false
  require_gpu: true
  xla_python_client_preallocate: true
  xla_python_client_mem_fraction: 0.90

output:
  log_dir: >-
    tasks/excited_state_nesvmc/0066_ferminet_pbc_paper_tangent_training_smoke_fix/logs/backend
  checkpoint_dir: >-
    tasks/excited_state_nesvmc/0066_ferminet_pbc_paper_tangent_training_smoke_fix/results/checkpoints
  validation_dir: >-
    tasks/excited_state_nesvmc/0066_ferminet_pbc_paper_tangent_training_smoke_fix/results/validation

diagnostics:
  import_ferminet: true
  build_pbc_config: true
  real_pbc_local_energy_training_smoke: true
  expected_external_states: 2
  walkers_per_state: 1
  steps: 2
  learning_rate: 1.0e-8
  gradient_mode: paper_tangent
  update_guards:
    finite_gradient: true
    finite_update: true
    finite_candidate_terms: true
    reject_nonfinite_update: true
  clipping:
    psi_ratio_clip_width: 10.0
    max_logabs_ratio: 30.0
    local_energy_clip_width: 5.0
  overlap_scaling:
    scale_by: max_gap_std
    min_gap_scale_factor: 0.001
    max_scale_factor: 5.0
  expected_output:
    - finite initial and final local-energy matrices with shape [2, 1]
    - finite initial and final state energies with shape [2]
    - finite initial and final 2x2 overlap matrices
    - finite true penalty objective for each training step
    - finite paper-tangent gradient objective for each training step
    - finite nonzero gradient and parameter-update norms for each step
    - accepted guarded update for each step

notes:
  status: ready_for_dry_run
  purpose: >-
    verify the paper-tangent fix that reuses precomputed real-local-energy
    penalty terms outside value_and_grad, records true pre-update objectives,
    and keeps the surrogate zero-primal correction forward-safe
  previous_failure: tasks/excited_state_nesvmc/0065_ferminet_pbc_paper_tangent_training_smoke
  local_patch:
    file: external/ferminet/ferminet/networks.py
    change: construct_symmetric_features uses broadcast_to instead of tile for spin-channel means
