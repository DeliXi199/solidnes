project: solidnes
experiment_name: diamond_c_ferminet_pbc_gamma_deepqmc_alignment_profile_diag_on_batch512_iter6
stage: excited_state_nesvmc
phase: deepqmc_alignment_speed_profile

backend:
  name: ferminet
  repository: https://github.com/google-deepmind/ferminet
  inspected_commit: c4312c315dda1c5728994ba89629744f71c6eb66
  mode: native_ferminet_excited_state

system_config: ../system/diamond_c_primitive_gamma.yaml
model_config: ../model/ferminet_pbc_small.yaml
sampler_config: ../sampler/metropolis_ferminet_pbc_short.yaml
train_config: ../train/excited_state_ferminet_pbc_native_kfac_deepqmc_alignment_profile_diag_on_batch512_iter6.yaml

ferminet_config_template:
  module: solidnes/backends/ferminet_configs/diamond_pbc_gamma.py

runtime:
  target_jax_version: 0.10.1
  cuda_extra: cuda12
  precision_profile: speed
  x64_enabled: false
  require_gpu: true
  xla_python_client_preallocate: true
  xla_python_client_mem_fraction: 0.90

output:
  log_dir: tasks/psiformer/0099_deepqmc_alignment_speed_benchmark/runs/ferminet_diag_on/logs/backend
  checkpoint_dir: tasks/psiformer/0099_deepqmc_alignment_speed_benchmark/runs/ferminet_diag_on/results/checkpoints
  validation_dir: tasks/psiformer/0099_deepqmc_alignment_speed_benchmark/runs/ferminet_diag_on/results/validation

diagnostics:
  native_ferminet_excited_state: true
  expected_states: 2
  independent_state_params: true
  independent_state_merge_keys: [layers/streams]
  diagonal_paths: {mcmc_trace: true, local_energy: true, overlap_jvp: true}
  profile_step_times: true
  profile_loss_components: true
  objective: vmc_overlap
  method_profile: szabo_noe_2024_penalty
  optimizer: kfac
  batch_size: 512
  iterations: 6

notes:
  status: ready_for_gpu_speed_profile
  purpose: >-
    Native FermiNet diagonal-on speed profile for DeepQMC alignment work.
