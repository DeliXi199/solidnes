project: solidnes
experiment_name: diamond_c_deepsolid_validation_stable
stage: phase1_validation
phase: carbon_diamond_ground_state_validation

backend:
  name: deepsolid
  repository: https://github.com/bytedance/DeepSolid
  inspected_commit: 812a2b8
  mode: external_backend

system_config: ../system/diamond_c_primitive_gamma.yaml
model_config: ../model/deepsolid_detnet_small.yaml
sampler_config: ../sampler/metropolis_deepsolid_validation.yaml
train_config: ../train/ground_state_deepsolid_validation_stable.yaml

deepsolid_config_template:
  module: solidnes/backends/deepsolid_configs/diamond_smoke.py
  input_string: C,C,3.57,1,sto-3g,1e-8

output:
  log_dir: tasks/phase1_diamond_c/sto3g/training/0007_deepsolid_validation_stable/logs/backend
  checkpoint_dir: tasks/phase1_diamond_c/sto3g/training/0007_deepsolid_validation_stable/results/checkpoints
  validation_dir: tasks/phase1_diamond_c/sto3g/training/0007_deepsolid_validation_stable/results/validation

diagnostics:
  import_deepsolid: true
  build_pyscf_cell: true
  electron_count: true
  hf_reference: true
  training_stats_summary: true
  short_gpu_training: true

notes:
  status: validation_ready
  purpose: stable carbon validation with lower Adam learning rate and larger batch
  physics_caveat: sto-3g basis and small detnet are still not production accuracy settings
