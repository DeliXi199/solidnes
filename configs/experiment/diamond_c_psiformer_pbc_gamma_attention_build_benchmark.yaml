project: solidnes
experiment_name: diamond_c_psiformer_pbc_gamma_attention_build_benchmark
stage: psiformer
phase: psiformer_attention_build_benchmark

backend:
  name: ferminet
  repository: https://github.com/google-deepmind/ferminet
  inspected_commit: c4312c315dda1c5728994ba89629744f71c6eb66
  mode: native_ferminet_psiformer

system_config: ../system/diamond_c_primitive_gamma.yaml
model_config: ../model/psiformer_pbc_small.yaml
sampler_config: ../sampler/metropolis_ferminet_pbc_short.yaml
train_config: ../train/excited_state_psiformer_pbc_native_kfac_paper_aligned_smoke.yaml

ferminet_config_template:
  module: solidnes/backends/ferminet_configs/diamond_pbc_gamma.py

runtime:
  target_jax_version: 0.10.1
  cuda_extra: cuda12
  precision_profile: speed
  x64_enabled: false
  require_gpu: false
  xla_python_client_preallocate: true
  xla_python_client_mem_fraction: 0.90

output:
  log_dir: tasks/psiformer/0094_psiformer_attention_build_benchmark/logs/backend
  checkpoint_dir: tasks/psiformer/0094_psiformer_attention_build_benchmark/results/checkpoints
  validation_dir: tasks/psiformer/0094_psiformer_attention_build_benchmark/results/validation

diagnostics:
  import_ferminet: true
  build_pbc_config: true
  native_ferminet_excited_state: true
  expected_states: 2
  objective: vmc_overlap
  method_profile: szabo_noe_2024_penalty
  optimizer: kfac
  batch_size: 4096
  iterations: 5
  model: psiformer
  attention_implementation: auto
  expected_outputs:
    - build-only config summary
    - local forward benchmark comparing ferminet and fused_qkv attention

notes:
  status: ready_for_local_benchmark
  purpose: >-
    First SolidNES PsiFormer task bundle. It validates the self-attention model
    path and compares upstream FermiNet attention with the fused-QKV variant
    before any scheduled GPU training.
