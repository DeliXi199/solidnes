training:
  target: ground_state
  seed: 0
  deterministic: true
  batch_size: 96
  use_x64: true
  iterations: 5000
  optimizer: adam
  learning_rate: 0.0003
  learning_rate_decay: 1.0
  learning_rate_delay: 10000.0
  laplacian_mode: for
  partition_number: 3
  clip_local_energy: 5.0
  ministeps: 1
  pretrain_method: net
  pretrain_iterations: 500
  pretrain_learning_rate: 0.0003
  pretrain_steps: 1
  checkpoint_every_minutes: 2
  log_every: 1

stability_checks:
  finite_energy: true
  finite_variance: true
  acceptance_range: [0.05, 0.95]
  expected_effect: complete_iter5000_run_with_regular_checkpoints
  estimated_runtime: under_1_hour_on_2xa100

notes:
  status: validation_ready
  purpose: full rerun of the iteration-dominant carbon sto-3g validation
  runtime_control: use Slurm walltime only
