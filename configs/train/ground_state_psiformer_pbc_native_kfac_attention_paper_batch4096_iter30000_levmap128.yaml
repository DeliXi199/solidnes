training:
  target: ground_state
  deterministic: true
  check_nan: false
  reset_if_nan: false
  batch_size: 4096
  iterations: 30000
  optimizer: kfac
  objective: vmc
  states: 0
  spin_penalty: 0.0
  observables_s2: false
  learning_rate: 0.03
  learning_rate_decay: 1.0
  learning_rate_delay: 10000.0
  laplacian: folx
  max_vmap_batch_size: 0
  max_local_energy_vmap_batch_size: 128
  clip_local_energy: 5.0
  clip_median: false
  center_at_clip: true
  pretrain_method: null
  pretrain_iterations: 0
  checkpoint_every_minutes: 10
  log_every: 1
  kfac:
    invert_every: 1
    cov_update_every: 1
    damping: 0.001
    cov_ema_decay: 0.95
    norm_constraint: 0.001
    norm_constraint_scale_by_states: false

stability_checks:
  finite_energy: true
  finite_variance: true
  acceptance_range: [0.05, 0.95]

notes:
  status: ground_state_psiformer_attention_30k_ready
  purpose: >-
    30000-step x64 paper-scale PsiFormer ground-state comparison config for
    FermiNet-shaped Q/K/V versus fused-QKV attention. No excited-state overlap,
    no spin penalty, no S2 observable, and no pretraining.
