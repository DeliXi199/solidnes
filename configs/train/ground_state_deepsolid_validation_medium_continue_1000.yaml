training:
  target: ground_state
  seed: 0
  deterministic: true
  batch_size: 16
  use_x64: true
  iterations: 1000
  optimizer: adam
  learning_rate: 0.0008
  learning_rate_decay: 1.0
  learning_rate_delay: 10000.0
  laplacian_mode: for
  partition_number: 3
  clip_local_energy: 5.0
  ministeps: 1
  pretrain_method: net
  pretrain_iterations: 200
  pretrain_learning_rate: 0.0003
  pretrain_steps: 1
  checkpoint_every_minutes: 999
  log_every: 1

stability_checks:
  finite_energy: true
  finite_variance: true
  acceptance_range: [0.05, 0.95]
  expected_restore_from_step: 500
  expected_tail_mean: lower_than_medium_500

notes:
  status: validation_ready
  purpose: lower-learning-rate continuation from medium checkpoint to step 1000
  restore_caveat: optimizer state is reset by the smoke compatibility shim
