training:
  target: ground_state
  deterministic: true
  batch_size: 4096
  iterations: 20000
  optimizer: kfac
  learning_rate: 0.03
  learning_rate_decay: 1.0
  learning_rate_delay: 10000.0
  laplacian: folx
  max_vmap_batch_size: 0
  clip_local_energy: 5.0
  clip_median: false
  center_at_clip: true
  pretrain_method: pbc_hf
  pretrain_pbc: true
  pretrain_basis: ccpvdz
  pretrain_iterations: 1000
  pretrain_learning_rate: 0.0003
  pretrain_mcmc_steps: 1
  pretrain_restricted: true
  pretrain_precision: 1.0e-8
  pretrain_exp_to_discard: 0.1
  checkpoint_every_minutes: 15
  log_every: 1
  kfac:
    invert_every: 1
    cov_update_every: 1
    damping: 0.001
    cov_ema_decay: 0.95
    norm_constraint: 0.001

stability_checks:
  finite_energy: true
  finite_variance: true
  acceptance_range: [0.05, 0.95]

notes:
  status: ready_to_submit
  purpose: paper-geometry FermiNet PBC diamond pilot with PySCF PBC-HF orbital pretraining
  implementation: SolidNES local FermiNet patch evaluates PySCF PBC KHF orbital matrices on the host and fits network.orbitals in a pmapped MSE step
