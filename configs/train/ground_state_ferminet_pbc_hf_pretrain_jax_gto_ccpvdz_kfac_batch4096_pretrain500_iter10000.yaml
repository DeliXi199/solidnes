training:
  target: ground_state
  deterministic: true
  batch_size: 4096
  iterations: 10000
  optimizer: kfac
  learning_rate: 0.03
  learning_rate_decay: 1.0
  learning_rate_delay: 10000.0
  laplacian: folx
  max_vmap_batch_size: 0
  clip_local_energy: 5.0
  clip_median: false
  center_at_clip: true
  pretrain_method: pbc_hf
  pretrain_pbc: true
  pretrain_target_backend: jax_pbc_gto
  pretrain_jax_pbc_image_cutoff: 3
  pretrain_basis: ccpvdz
  pretrain_iterations: 500
  pretrain_learning_rate: 0.0003
  pretrain_mcmc_steps: 1
  pretrain_log_every: 10
  pretrain_target_chunk_size: 0
  pretrain_restricted: true
  pretrain_precision: 1.0e-10
  pretrain_exp_to_discard: 0.1
  checkpoint_every_minutes: 15
  log_every: 1
  kfac:
    invert_every: 1
    cov_update_every: 1
    damping: 0.001
    cov_ema_decay: 0.95
    norm_constraint: 0.001

stability_checks:
  finite_energy: true
  finite_variance: true
  acceptance_range: [0.05, 0.95]

notes:
  status: sweep_ready
  purpose: 20-minute timeboxed JAX PBC-HF pretrain sweep with 500 pretrain steps before KFAC/FOLX
