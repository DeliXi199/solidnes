training:
  target: excited_state
  deterministic: true
  batch_size: 64
  iterations: 20
  optimizer: kfac
  objective: vmc_overlap
  states: 2
  overlap_penalty: 1.0
  overlap_weights: null
  learning_rate: 0.03
  learning_rate_decay: 1.0
  learning_rate_delay: 10000.0
  laplacian: folx
  max_vmap_batch_size: 0
  clip_local_energy: 5.0
  clip_median: false
  center_at_clip: true
  pretrain_method: null
  pretrain_iterations: 0
  checkpoint_every_minutes: 15
  log_every: 1
  kfac:
    invert_every: 1
    cov_update_every: 1
    damping: 0.001
    cov_ema_decay: 0.95
    norm_constraint: 0.001

stability_checks:
  finite_energy: true
  finite_variance: true
  acceptance_range: [0.05, 0.95]
  finite_overlap_matrix: true

notes:
  status: native_excited_smoke_ready
  purpose: >-
    Short native FermiNet excited-state penalty-VMC smoke using upstream
    vmc_overlap, multi-state network outputs, local-energy matrix diagnostics,
    and KFAC multi_device=True instead of the external state-wrapper path.
