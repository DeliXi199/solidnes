training:
  target: ground_state
  seed: 0
  deterministic: true
  batch_size: 96
  use_x64: true
  iterations: 5000
  optimizer: adam
  learning_rate: 0.0003
  learning_rate_decay: 1.0
  learning_rate_delay: 10000.0
  laplacian_mode: for
  partition_number: 3
  clip_local_energy: 5.0
  ministeps: 1
  pretrain_method: net
  pretrain_iterations: 500
  pretrain_learning_rate: 0.0003
  pretrain_steps: 1
  checkpoint_every_minutes: 999
  log_every: 1

stability_checks:
  finite_energy: true
  finite_variance: true
  acceptance_range: [0.05, 0.95]
  expected_effect: longer_tail_plateau_test_than_batch64_mcmc10
  estimated_runtime: about_25_to_35_minutes_on_2xa100

notes:
  status: validation_ready
  purpose: iteration-dominant carbon sto-3g validation run
  rationale: prioritize more optimization steps while only mildly increasing sampling parameters
