training:
  target: ground_state
  seed: 0
  deterministic: true
  batch_size: 16
  use_x64: true
  iterations: 200
  optimizer: adam
  learning_rate: 0.003
  learning_rate_decay: 1.0
  learning_rate_delay: 10000.0
  laplacian_mode: for
  partition_number: 3
  clip_local_energy: 5.0
  ministeps: 1
  pretrain_method: net
  pretrain_iterations: 100
  pretrain_learning_rate: 0.0003
  pretrain_steps: 1
  checkpoint_every_minutes: 999
  log_every: 1

stability_checks:
  finite_energy: true
  finite_variance: true
  acceptance_range: [0.05, 0.95]
  expected_restore_from_step: 100

notes:
  status: validation_ready
  purpose: continuation probe from diamond_c_deepsolid_validation_pretrain checkpoint
