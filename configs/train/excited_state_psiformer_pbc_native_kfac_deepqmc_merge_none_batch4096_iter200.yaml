training:
  target: excited_state
  deterministic: true
  check_nan: false
  reset_if_nan: false
  batch_size: 4096
  iterations: 200
  optimizer: kfac
  objective: vmc_overlap
  method_profile: szabo_noe_2024_penalty
  states: 2
  independent_state_params: true
  parameter_sharing:
    merge_keys: []
  diagonal_paths:
    mcmc_trace: true
    local_energy: true
    overlap_jvp: true
  profiling:
    step_times: true
  overlap_penalty: 4.0
  overlap_weights: null
  overlap_scale_by: max_gap_std
  overlap_min_scale: 0.001
  overlap_max_scale: 5.0
  overlap_clip_width: 10.0
  overlap_clip_exclude_width: .inf
  overlap_sort_states_by: null
  overlap_use_ewm_scale: true
  overlap_ewm_max_alpha: 0.999
  overlap_ewm_decay_alpha: 10.0
  spin_penalty: 0.0
  observables_s2: false
  learning_rate: 0.05
  learning_rate_decay: 1.0
  learning_rate_delay: 50000.0
  laplacian: folx
  max_vmap_batch_size: 0
  max_local_energy_vmap_batch_size: 128
  clip_local_energy: 5.0
  clip_median: true
  center_at_clip: true
  pretrain_method: null
  pretrain_iterations: 0
  checkpoint_every_minutes: 10
  log_every: 1
  kfac:
    invert_every: 1
    cov_update_every: 1
    damping: 0.001
    cov_ema_decay: 0.95
    norm_constraint: 0.001
    norm_constraint_scale_by_states: false

notes:
  status: deepqmc_merge_keys_4gpu_merge_none
  purpose: >-
    Production-like 4GPU x64 PsiFormer stability run with diagonal paths
    enabled and no shared parameter leaves across states.
