training:
  target: ground_state
  seed: 0
  deterministic: true
  batch_size: 16
  use_x64: true
  iterations: 50
  optimizer: adam
  learning_rate: 0.005
  learning_rate_decay: 1.0
  learning_rate_delay: 10000.0
  laplacian_mode: for
  partition_number: 3
  clip_local_energy: 5.0
  ministeps: 1
  pretrain_iterations: 0
  checkpoint_every_minutes: 999
  log_every: 1

stability_checks:
  finite_energy: true
  finite_variance: true
  acceptance_range: [0.05, 0.95]
  expected_energy_trend: downward_after_warmup

notes:
  status: validation_ready
  purpose: lower-learning-rate carbon validation after noisy 20-step run
