training:
  target: ground_state
  deterministic: true
  batch_size: 4096
  iterations: 400
  optimizer: kfac
  learning_rate: 0.03
  learning_rate_decay: 1.0
  learning_rate_delay: 10000.0
  laplacian: folx
  max_vmap_batch_size: 0
  clip_local_energy: 5.0
  clip_median: false
  center_at_clip: true
  pretrain_method: null
  pretrain_iterations: 0
  checkpoint_every_minutes: 15
  log_every: 1
  kfac:
    invert_every: 1
    cov_update_every: 1
    damping: 0.001
    cov_ema_decay: 0.95
    norm_constraint: 0.001

stability_checks:
  finite_energy: true
  finite_variance: true
  acceptance_range: [0.05, 0.95]

notes:
  status: baseline_ready
  purpose: batch4096 FermiNet PBC diamond KFAC benchmark with FOLX Forward Laplacian
