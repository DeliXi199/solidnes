training:
  target: ground_state
  seed: 0
  deterministic: true
  batch_size: 96
  use_x64: true
  iterations: 10000
  optimizer: adam
  learning_rate: 0.0002
  learning_rate_decay: 1.0
  learning_rate_delay: 5000.0
  laplacian_mode: for
  partition_number: 3
  clip_local_energy: 5.0
  ministeps: 1
  pretrain_method: net
  pretrain_iterations: 0
  pretrain_learning_rate: 0.0003
  pretrain_steps: 1
  checkpoint_every_minutes: 2
  log_every: 1

stability_checks:
  finite_energy: true
  finite_variance: true
  acceptance_range: [0.05, 0.95]
  expected_effect: lower_lr_continuation_from_ckpt4999
  estimated_runtime: under_1_hour_on_4xa100

notes:
  status: validation_ready
  purpose: continue optimization from the full 5000-step checkpoint with a gentler learning rate
  checkpoint_semantics: DeepSolid restores qmcjax_ckpt_004999 then trains steps 5000 through 9999
  learning_rate_rationale: start below the previous 3e-4 rate and decay toward about 1e-4 over this continuation
