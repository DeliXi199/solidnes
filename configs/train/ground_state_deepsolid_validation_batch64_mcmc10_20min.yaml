training:
  target: ground_state
  seed: 0
  deterministic: true
  batch_size: 64
  use_x64: true
  iterations: 800
  optimizer: adam
  learning_rate: 0.0005
  learning_rate_decay: 1.0
  learning_rate_delay: 10000.0
  laplacian_mode: for
  partition_number: 3
  clip_local_energy: 5.0
  ministeps: 1
  pretrain_method: net
  pretrain_iterations: 300
  pretrain_learning_rate: 0.0003
  pretrain_steps: 1
  checkpoint_every_minutes: 999
  log_every: 1

stability_checks:
  finite_energy: true
  finite_variance: true
  acceptance_range: [0.05, 0.95]
  expected_effect: lower_step_noise_than_batch16_medium
  estimated_runtime: about_20_minutes_on_2xa100

notes:
  status: validation_ready
  purpose: about-20-minute larger-batch validation run for carbon sto-3g noise reduction
  rationale: start fresh because existing medium checkpoints have batch16 walker shape
